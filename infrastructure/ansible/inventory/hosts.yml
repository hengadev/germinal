# Germinal Inventory
# Usage: ansible-playbook -i inventory/hosts.yml playbooks/site.yml

all:
  children:
    germinal_servers:
      hosts:
        germinal_vps:
          # VPS hostname or IP (will be overridden by --extra-vars or terraform output)
          ansible_host: YOUR_VPS_IP
          ansible_user: root  # Initial connection as root, then we switch to deploy user

      vars:
        # Application
        app_name: germinal
        app_domain: "{{ lookup('env', 'APP_DOMAIN') | default('germinalstudio.co', true) }}"
        app_env: "{{ lookup('env', 'APP_ENV') | default('production', true) }}"
        app_port: 3001
        app_docker_image: "henga/germinal:latest"

        # Directories
        app_base_dir: /opt/{{ app_name }}
        app_data_dir: "{{ app_base_dir }}/data"
        app_logs_dir: "{{ app_base_dir }}/logs"
        app_backup_dir: "{{ app_base_dir }}/backups"

        # Docker
        docker_compose_version: "v2.30.3"
        docker_users: ["{{ deploy_user }}"]

        # Caddy Reverse Proxy
        caddy_enabled: true
        caddy_client_max_body_size: "100M"

        # SSH Configuration
        ssh_port: 22
        ssh_password_authentication: false
        # SECURITY: Root login with SSH key only (no password) - allows admin access
        # Options: "yes" (allow all), "no" (deny all), "without-password" (key-only)
        ssh_permit_root_login: "without-password"
        ssh_allowed_users: ["root", "{{ deploy_user }}"]

        # Firewall
        firewall_allowed_ports:
          - { port: "{{ ssh_port }}", proto: tcp }
          - { port: 80, proto: tcp }
          - { port: 443, proto: tcp }

        # Backups
        backup_s3_bucket: "{{ lookup('env', 'BACKUP_S3_BUCKET') | default('', true) }}"
        backup_s3_region: "{{ lookup('env', 'BACKUP_S3_REGION') | default('eu-central-1', true) }}"
        backup_retention_days: 90

    # Staging environment - same VPS, shares prod's postgres/redis/caddy
    germinal_staging_servers:
      hosts:
        germinal_vps:
          ansible_host: YOUR_VPS_IP
          ansible_user: root

      vars:
        # Application
        app_name: germinal_staging
        app_domain: "{{ lookup('env', 'APP_DOMAIN') | default('germinalstudio.co', true) }}"
        app_env: staging
        app_port: 3001
        app_docker_image: "henga/germinal:staging"

        # Directories
        app_base_dir: /opt/germinal-staging
        app_data_dir: "{{ app_base_dir }}/data"
        app_logs_dir: "{{ app_base_dir }}/logs"
        app_backup_dir: "{{ app_base_dir }}/backups"

        # Staging uses shared postgres/redis from production - no own services
        use_shared_services: true
        # Name of the production Docker network to join
        prod_network_name: germinal_network
        # Database name on shared postgres (prod uses 'germinal')
        db_name: germinal_staging
        # Used by env.j2 for the staging DATABASE_URL (avoids db_name shadowing from all.yml)
        staging_db_name: germinal_staging
        # Redis DB index (prod uses 0)
        redis_db: 1

        # Caddy is managed by prod - staging only deploys the app container
        caddy_enabled: false

        # No host port binding - Caddy on prod network handles external access
        caddy_client_max_body_size: "100M"
