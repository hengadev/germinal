# Germinal Ansible Configuration

[defaults]
# Inventory file location
inventory = inventory/hosts.yml
roles_path = roles

# SSH host key checking - SECURITY: Keep enabled for production
# Disable only for initial setup with known hosts in trusted environments
# host_key_checking = False  # ⚠️ SECURITY: Only disable if you understand the risks

# SSH configuration with strict host key checking
# Use 'accept-new' to auto-accept new hosts but still detect changes
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new

# Display task timing
callback_whitelist = timer, profile_tasks

# Retry files
retry_files_enabled = False

# Gathering facts
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 3600

# Privilege escalation
become = True
become_method = sudo
become_ask_pass = False

# SSH timeout
timeout = 30

# Enable YAML callback for better output (requires ansible-community)
# bin_ansible_callbacks = True

[ssh_connection]
pipelining = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
# Control persist timeout
control_persist = 60s
