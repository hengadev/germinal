---
# Nginx Reverse Proxy Tasks
# - Install nginx
# - Configure SSL/TLS
# - Set up reverse proxy to application
# - Configure security headers
# - Set up log rotation

- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

- name: Create nginx directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - /etc/nginx/sites-available
    - /etc/nginx/sites-enabled
    - /etc/nginx/conf.d
    - /var/log/nginx

- name: Configure nginx main settings
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    mode: '0644'
    backup: true
  notify: reload nginx
  tags: nginx-config

- name: Create DH parameters for DHE ciphersuites (can take a few minutes)
  ansible.builtin.command:
    cmd: openssl dhparam -out /etc/nginx/dhparam.pem 2048
    creates: /etc/nginx/dhparam.pem
  async: 600
  poll: 10
  notify: reload nginx

- name: Configure application reverse proxy
  ansible.builtin.template:
    src: site.conf.j2
    dest: "/etc/nginx/sites-available/{{ app_name }}.conf"
    mode: '0644'
  notify: reload nginx
  tags: nginx-config

- name: Enable application site
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ app_name }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ app_name }}.conf"
    state: link
  notify: reload nginx

- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Create logrotate config for nginx
  ansible.builtin.copy:
    dest: /etc/logrotate.d/nginx-custom
    content: |
      /var/log/nginx/*.log {
        daily
        rotate 14
        compress
        delaycompress
        missingok
        notifempty
        create 0640 www-data adm
        sharedscripts
        postrotate
          [ -f /var/run/nginx.pid ] && kill -USR1 `cat /var/run/nginx.pid`
        endscript
      }
    mode: '0644'

- name: Ensure nginx is enabled and started
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true

- name: Verify nginx configuration
  ansible.builtin.command:
    cmd: nginx -t
  register: nginx_test
  changed_when: false
  failed_when: nginx_test.rc != 0

- name: Create nginx health check
  ansible.builtin.copy:
    dest: "{{ app_base_dir }}/scripts/nginx-health.sh"
    content: |
      #!/bin/bash
      # Check if nginx is serving requests
      curl -f -s -o /dev/null http://localhost/nginx-health
    mode: '0750'
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
