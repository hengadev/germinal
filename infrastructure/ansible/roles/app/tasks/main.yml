---
# Application Deployment Tasks
# - Create directory structure
# - Setup environment file
# - Create Docker Compose configuration
# - Start application services

- name: Create application subdirectories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0750'
  loop:
    - "{{ app_base_dir }}/scripts"
    - "{{ app_base_dir }}/config"
    - "{{ app_data_dir }}/postgres"
    - "{{ app_data_dir }}/redis"

- name: Create .env file from template
  ansible.builtin.template:
    src: env.j2
    dest: "{{ app_base_dir }}/.env"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0600'
  when: app_env_vars is defined and app_env_vars | length > 0

- name: Create Docker Compose configuration
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ app_base_dir }}/docker-compose.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0640'

- name: Create production startup script
  ansible.builtin.template:
    src: prod-start.sh.j2
    dest: "{{ app_base_dir }}/prod-start.sh"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0750'

- name: Create logrotate config for application logs
  ansible.builtin.copy:
    dest: /etc/logrotate.d/germinal
    content: |
      {{ app_logs_dir }}/*.log {
        daily
        rotate 14
        compress
        delaycompress
        missingok
        notifempty
        create 0640 {{ deploy_user }} {{ deploy_user }}
      }
    mode: '0644'

- name: Create health check script
  ansible.builtin.template:
    src: health-check.sh.j2
    dest: "{{ app_base_dir }}/scripts/health-check.sh"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0750'

- name: Mark application as deployed
  ansible.builtin.set_fact:
    app_deployed: true
