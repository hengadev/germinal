---
# Firewall (UFW) Configuration Tasks
# - Configure default policies
# - Allow SSH, HTTP, HTTPS
# - Enable UFW

- name: Reset UFW to default settings
  community.general.ufw:
    state: reset

- name: Set UFW default policies
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }

- name: Allow SSH connection
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp

- name: Allow HTTP and HTTPS
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - 80
    - 443

- name: Allow custom application ports if specified
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
  loop: "{{ firewall_allowed_ports }}"
  when: firewall_allowed_ports is defined

- name: Rate limit SSH to prevent brute force
  community.general.ufw:
    rule: limit
    port: "{{ ssh_port }}"
    proto: tcp

- name: Enable UFW
  community.general.ufw:
    state: enabled

- name: Check UFW status
  ansible.builtin.command:
    cmd: ufw status verbose
  register: ufw_status
  changed_when: false
