# Germinal - Group Variables
# These variables apply to all hosts

# ============================================
# Deploy User Configuration
# ============================================
deploy_user: germinal
deploy_user_groups: ["sudo", "docker"]

# SECURITY: Restrict sudo to specific commands (recommended: true)
# Set to false for development/convenience, true for production
deploy_sudo_restricted: true

# SECURITY: Allow password-based sudo as fallback (requires deploy user password)
# Set to true if you want to allow other commands with password
deploy_sudo_password_fallback: false

# Your public SSH key for the deploy user
# You can also set this via: ansible-playbook --extra-vars "deploy_ssh_public_key=$(cat ~/.ssh/germinal.pub)"
deploy_ssh_public_key: "{{ lookup('env', 'DEPLOY_SSH_PUBLIC_KEY') | default('', true) }}"

# ============================================
# System Configuration
# ============================================
# System timezone
system_timezone: Etc/UTC

# Automatic security updates
auto_security_updates: true
auto_updates_reboot: false
auto_updates_email: "{{ vault_contact_email | default('root@localhost') }}"
auto_updates_blacklist:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

# ============================================
# Docker Configuration
# ============================================
docker_daemon_options:
  log-driver: "json-file"
  log-opts:
    max-size: "10m"
    max-file: "3"
  # SECURITY: Metrics endpoint bound to localhost only
  # Change to "0.0.0.0:9323" ONLY if using Prometheus with firewall rules
  metrics-addr: "127.0.0.1:9323"
  experimental: false

# Docker Security Hardening
# SECURITY: Disable inter-container communication on default bridge
# User-defined networks (like germinal_network) are unaffected
docker_daemon_icc: false
docker_daemon_userland_proxy: false
docker_daemon_no_new_privileges: true
docker_daemon_live_restore: true
docker_daemon_ulimit_nofile: 64000

# ============================================
# Fail2ban Configuration
# ============================================
fail2ban_enabled: true
# IPs to never ban (localhost + your public IP)
fail2ban_ignoreip: "127.0.0.1/8 ::1"
fail2ban_maxretry: 5
fail2ban_bantime: 3600
fail2ban_findtime: 600
fail2ban_ssh_maxretry: 3
fail2ban_ssh_bantime: 7200
fail2ban_ddos_maxretry: 2
fail2ban_ddos_bantime: 86400
fail2ban_caddy_maxretry: 5
fail2ban_notify_email: "{{ vault_contact_email | default('root@localhost') }}"

# ============================================
# Caddy Reverse Proxy Configuration
# ============================================
# Cloudflare API token for DNS-01 challenge (stored in vault)
caddy_cloudflare_api_token: "{{ vault_caddy_cloudflare_api_token | default('') }}"

# Set to true once staging is deployed to include staging site blocks in Caddyfile
staging_enabled: false

# ============================================
# Database and Session Configuration
# ============================================
# These are populated from vault variables
db_user: "{{ vault_db_user | default('germinal') }}"
db_password: "{{ vault_db_password | default('change_me') }}"
db_name: "{{ vault_db_name | default('germinal') }}"
session_secret: "{{ vault_session_secret | default('change_me_to_random_string') }}"

# ============================================
# Application Environment Variables
# ============================================
# These are populated from vault variables
app_env_vars:
  # S3 Configuration
  S3_BUCKET: "{{ vault_s3_bucket | default('') }}"
  S3_REGION: "{{ vault_s3_region | default('eu-central-1') }}"
  S3_PUBLIC_URL: "{{ vault_s3_public_url | default('') }}"
  MEDIA_URL: "{{ vault_media_url | default('') }}"

  # AWS Credentials
  AWS_ACCESS_KEY_ID: "{{ vault_aws_access_key_id | default('') }}"
  AWS_SECRET_ACCESS_KEY: "{{ vault_aws_secret_access_key | default('') }}"
  AWS_REGION: "{{ vault_aws_region | default('eu-central-1') }}"

  # Email Configuration
  SMTP_FROM_EMAIL: "{{ vault_smtp_from_email | default('noreply@' + app_domain) }}"
  SMTP_FROM_NAME: "{{ vault_smtp_from_name | default('Germinal') }}"
  CONTACT_EMAIL: "{{ vault_contact_email | default('contact@' + app_domain) }}"

  # Stripe Configuration
  STRIPE_SECRET_KEY: "{{ vault_stripe_secret_key | default('') }}"
  STRIPE_WEBHOOK_SECRET: "{{ vault_stripe_webhook_secret | default('') }}"

  # Cron Security
  CRON_SECRET: "{{ vault_cron_secret | default('change-me-to-a-secure-random-string-min-32-chars') }}"

  # Public URL
  PUBLIC_URL: "{{ vault_public_url | default('https://' + app_domain) }}"

  # File Upload Configuration
  MAX_FILE_SIZE: "{{ vault_max_file_size | default('10485760') }}"
  ALLOWED_IMAGE_TYPES: "{{ vault_allowed_image_types | default('image/jpeg,image/png,image/webp,image/gif') }}"
  ALLOWED_VIDEO_TYPES: "{{ vault_allowed_video_types | default('video/mp4,video/webm,video/quicktime') }}"
  BODY_SIZE_LIMIT: "{{ vault_body_size_limit | default('15728640') }}"

  # Reservation Configuration
  RESERVATION_EXPIRY_MINUTES: "{{ vault_reservation_expiry_minutes | default('15') }}"

  # Mock Data Mode
  USE_MOCK_DATA: "{{ vault_use_mock_data | default('false') }}"

  # Twilio SMS (Optional)
  TWILIO_ACCOUNT_SID: "{{ vault_twilio_account_sid | default('') }}"
  TWILIO_AUTH_TOKEN: "{{ vault_twilio_auth_token | default('') }}"
  TWILIO_PHONE_NUMBER: "{{ vault_twilio_phone_number | default('') }}"

  # Monitoring (Optional)
  SENTRY_DSN: "{{ vault_sentry_dsn | default('') }}"
  USE_SCHEDULER: "{{ vault_use_scheduler | default('false') }}"

# ============================================
# Backup Configuration
# ============================================
backup_enabled: true
backup_schedule_daily: "0 2 * * *"
backup_schedule_weekly: "0 3 * * 0"
backup_schedule_monthly: "0 4 1 * *"
backup_volumes_enabled: true
backup_configs_enabled: true
backup_s3_storage_class: "STANDARD_IA"

# ============================================
# Monitoring (Optional)
# ============================================
monitoring_enabled: false
monitoring_cadvisor_port: 8081
monitoring_node_exporter_port: 9100
