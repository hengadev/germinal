---
# Germinal Staging Vault - Example
# Copy to germinal_staging.vault.yml and encrypt:
#   ansible-vault encrypt group_vars/germinal_staging.vault.yml
#
# Variables defined here OVERRIDE the same-named variables from all.vault.yml
# for hosts in the germinal_staging_servers group.
#
# Only define vars that need DIFFERENT values from production.
# Shared secrets (AWS keys, Twilio, etc.) are inherited automatically.

# Session secret - must differ from production
vault_staging_session_secret: "change-me-staging-session-secret-min-32-characters"

# AWS credentials - staging IAM user (from: terraform output -json env_variables)
vault_staging_aws_access_key_id: "AKIASMN3R66CEGCZ7RWV"
vault_staging_aws_secret_access_key: "replace-with-staging-secret"

# S3 - dedicated staging bucket (from: terraform output media_bucket_name)
vault_staging_s3_bucket: "staging-germinal-media"
vault_staging_s3_region: "eu-west-3"
vault_staging_s3_public_url: "https://staging-germinal-media.s3.eu-west-3.amazonaws.com"
vault_staging_media_url: "https://media.germinalstudio.co"

# Stripe - use Stripe TEST mode keys for staging
vault_staging_stripe_secret_key: "sk_test_..."
vault_staging_stripe_publishable_key: "pk_test_..."
vault_staging_stripe_webhook_secret: "whsec_test_..."

# Cron security - staging-specific secret (min 32 chars)
vault_staging_cron_secret: "change-me-staging-cron-secret-min-32-characters-here"

# Sentry DSN for staging (optional - leave empty to disable)
vault_staging_sentry_dsn: ""
