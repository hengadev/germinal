# Ansible Vault - Example Variables
# Copy this file to all.vault.yml and fill in your actual values
# Then encrypt it with: ansible-vault encrypt group_vars/all.vault.yml

# ============================================
# Database Credentials
# ============================================
vault_db_password: "your_secure_postgres_password_here"
vault_session_secret: "your_random_32_character_string_here"

# ============================================
# AWS Credentials (from Terraform outputs)
# ============================================
# Run: terraform output -raw iam_access_key_id
vault_aws_access_key_id: "AKIAIOSFODNN7EXAMPLE"
vault_aws_secret_access_key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
vault_aws_region: "eu-west-3"
vault_s3_bucket: "development-germinal-media"
vault_s3_region: "eu-central-1"

# ============================================
# Email Configuration (Amazon SES API)
# ============================================
# Email sending uses SES API via AWS credentials above
# Only sender information is needed here
vault_smtp_from_email: "noreply@yourdomain.com"
vault_smtp_from_name: "Germinal"

# ============================================
# Contact Email
# ============================================
vault_contact_email: "you@yourdomain.com"

# ============================================
# Backup AWS Credentials (if different from S3)
# ============================================
vault_backup_aws_access_key: ""
vault_backup_aws_secret_key: ""

# ============================================
# OAuth Credentials (Optional)
# ============================================
vault_github_client_id: ""
vault_github_client_secret: ""
vault_google_client_id: ""
vault_google_client_secret: ""
