services:
  # Germinal application - Production
  app:
    image: ${DOCKER_IMAGE:-germinal:latest}
    container_name: germinal-prod
    ports:
      - "4100:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - USE_MOCK_DATA=false
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - germinal-prod-network

  # PostgreSQL database - Production
  db:
    image: postgres:15-alpine
    container_name: germinal-db-prod
    environment:
      - POSTGRES_DB=germinal_prod
      - POSTGRES_USER=germinal
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U germinal -d germinal_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - germinal-prod-network

volumes:
  postgres_data_prod:
    driver: local

networks:
  germinal-prod-network:
    driver: bridge
